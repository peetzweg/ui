name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Version comes from the `packageManager` field in package.json.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Lint the shadcn manifest before it ships: schema, duplicate names,
      # include rules, and that every item's declared file paths exist.
      - name: Validate registry
        run: pnpm registry:validate

      - name: Build (Vocs static export)
        run: pnpm build
